<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParkIQ - Live Map</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800;6..12,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="map.css">
</head>

<body>

    <nav class="navbar" id="navbar">
        <div class="container nav-wrap">
            <a href="index.html" class="logo">
                <div class="logo-mark"><i data-lucide="square-parking"></i></div>
                <span>ParkIQ</span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="index.html" class="nav-link">Home</a>
                <a href="index.html#features" class="nav-link">Features</a>
                <a href="map.html" class="nav-link active">Live Map <i data-lucide="external-link"
                        style="width: 14px; height: 14px;"></i></a>
                <a href="index.html#pricing" class="nav-link">Pricing</a>
                <a href="index.html#contact" class="nav-link">Contact</a>
            </div>
            <div class="nav-right">
                <a href="index.html#pricing" class="btn btn-primary btn-nav">Get Started</a>
            </div>
        </div>
    </nav>

    <div id="map"></div>

    <!-- Booking Panel (Uber-style) -->
    <div class="booking-panel">
        <h2 class="booking-title">Find Parking</h2>

        <div class="location-inputs">
            <div class="timeline-dots">
                <div class="dot dot-start"></div>
                <div class="line"></div>
                <div class="dot dot-end flex-center">
                    <div class="inner-square"></div>
                </div>
            </div>

            <div class="inputs-wrapper">
                <div class="input-group">
                    <input type="text" class="location-input" value="Current Location" readonly>
                </div>
                <div class="input-group">
                    <input type="text" class="location-input" placeholder="Where to park?">
                </div>
            </div>
        </div>

        <div class="booking-options">
            <button class="option-btn">
                <i data-lucide="clock" class="icon-sm"></i>
                <span>Park now</span>
                <i data-lucide="chevron-down" class="chevron"></i>
            </button>
            <button class="option-btn">
                <i data-lucide="user" class="icon-sm"></i>
                <span>For me</span>
                <i data-lucide="chevron-down" class="chevron"></i>
            </button>
        </div>

        <button class="search-btn">Search</button>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script src="map.js"></script>
</body>

</html>
