<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParkIQ - Secure Checkout</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800;6..12,900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #fafafa;
            --surface: #ffffff;
            --text: #111111;
            --text-sec: #71717a;
            --border: #e4e4e7;
            --primary: #1a1a1a;
            --primary-hover: #333333;
            --accent: #2563eb;
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Nunito Sans', sans-serif; background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; min-height: 100vh; }
        
        .navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
        }
        .navbar a { text-decoration: none; color: var(--text); display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 1.2rem; }
        .back-btn { color: var(--text-sec); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; font-weight: 700; font-size: 0.9rem; margin-bottom: 24px; transition: color 0.2s;}
        .back-btn:hover { color: var(--text); }
        
        .container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px 20px; }
        
        .checkout-card {
            background: var(--surface);
            width: 100%;
            max-width: 420px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: 0 4px 24px rgba(0,0,0,0.04);
            padding: 32px;
        }

        .checkout-title { font-size: 1.5rem; font-weight: 900; margin-bottom: 8px; letter-spacing: -0.02em; }
        .checkout-subtitle { color: var(--text-sec); font-size: 0.95rem; margin-bottom: 30px; font-weight: 600; }

        .summary-box {
            background: #f4f4f5;
            border-radius: var(--radius-md);
            padding: 20px;
            margin-bottom: 30px;
        }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.95rem; font-weight: 600; color: var(--text-sec); }
        .summary-row:last-child { margin-bottom: 0; }
        .summary-val { color: var(--text); font-weight: 800; }
        
        .divider { height: 1px; background: var(--border); margin: 20px 0; }
        
        .total-row { display: flex; justify-content: space-between; align-items: center; }
        .total-label { font-size: 1.1rem; font-weight: 800; }
        .total-price { font-size: 1.8rem; font-weight: 900; color: var(--accent); }

        .payment-method {
            display: flex; align-items: center; gap: 12px;
            padding: 16px; border: 2px solid var(--primary);
            border-radius: var(--radius-md); margin-bottom: 30px;
            background: #f8fafc; cursor: pointer;
        }
        .payment-method i { color: var(--primary); }
        .payment-method span { font-weight: 800; font-size: 0.95rem; }

        .btn-pay {
            width: 100%; padding: 16px; background: var(--primary); color: white;
            border: none; border-radius: var(--radius-md); font-family: inherit;
            font-size: 1.05rem; font-weight: 800; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 8px;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-pay:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-pay:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .loader { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast */
        .toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: white; border-radius: 10px; padding: 14px 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); transform: translateY(-20px); opacity: 0; transition: all 0.3s ease; border: 1px solid var(--border); }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast-error i { color: #ef4444; }
        .toast-info i { color: var(--accent); }
        .toast-content { font-weight: 700; font-size: 0.9rem; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="map.html"><i data-lucide="square-parking"></i> ParkIQ</a>
    </nav>

    <div id="toastContainer" class="toast-container"></div>

    <div class="container">
        <div>
            <a href="map.html" class="back-btn"><i data-lucide="arrow-left"></i> Back to map</a>
            
            <div class="checkout-card">
                <h1 class="checkout-title">Review & Reserve</h1>
                <p class="checkout-subtitle">Complete your payment to secure this spot.</p>

                <div class="summary-box">
                    <div class="summary-row">
                        <span>Parking Location</span>
                        <span class="summary-val" id="lblLocation">Loading...</span>
                    </div>
                    <div class="summary-row">
                        <span>Duration</span>
                        <span class="summary-val">2 Hours</span>
                    </div>
                    <div class="summary-row">
                        <span>Rate (per hour)</span>
                        <span class="summary-val" id="lblRate">₹--</span>
                    </div>
                    <div class="divider"></div>
                    <div class="total-row">
                        <span class="total-label">Subtotal</span>
                        <span class="total-price" id="lblTotal">₹--</span>
                    </div>
                </div>

                <div class="payment-method">
                    <i data-lucide="credit-card"></i>
                    <span>Credit / Debit Card (Saved)</span>
                </div>

                <button id="payBtn" class="btn-pay">
                    <div class="loader" id="payLoader"></div>
                    <span id="payText">Pay & Reserve</span>
                    <i data-lucide="lock" id="payIcon" style="width: 16px;"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="payment.js"></script>
</body>
</html>
