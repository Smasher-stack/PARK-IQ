<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParkIQ - Explore Parking</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800;6..12,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="map.css">
</head>

<body>

    <nav class="navbar" id="navbar">
        <div class="container nav-wrap">
            <a href="index.html" class="logo">
                <div class="logo-mark"><i data-lucide="square-parking"></i></div>
                <span>ParkIQ</span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="index.html" class="nav-link">Home</a>
                <a href="index.html#features" class="nav-link">Features</a>
                <a href="map.html" class="nav-link active">Explore Parking <i data-lucide="external-link"
                        style="width: 14px; height: 14px;"></i></a>
                <a href="index.html#pricing" class="nav-link">Pricing</a>
                <a href="index.html#contact" class="nav-link">Contact</a>
            </div>
            <div class="nav-right" style="display: flex; gap: 12px;">
                <a href="login.html" class="btn btn-ghost btn-nav" style="padding: 6px 14px; font-size: 0.85rem;">Log In</a>
                <a href="index.html#pricing" class="btn btn-primary btn-nav">Get Started</a>
            </div>
        </div>
    </nav>

    <!-- Map Control Container (Floating Right) -->
    <div style="position: absolute; top: 90px; right: 24px; z-index: 1000; display: flex; flex-direction: column; gap: 12px; align-items: flex-end;">
        
        <!-- Heatmap Pill -->
        <button id="toggleHeatmap" style="background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 2px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 99px; padding: 10px 16px; font-weight: 800; font-size: 0.85rem; color: var(--text); cursor: pointer; display: flex; align-items: center; transition: all 0.2s;">
            <i data-lucide="flame" style="width: 18px; margin-right: 6px; color: #f97316;"></i> Heatmap Density
        </button>

        <!-- Filters Box (Glassmorphism) -->
        <div class="filters-panel" style="background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.8); padding: 20px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.12); width: 260px;">
            <h3 style="font-size: 1rem; font-weight: 900; margin-bottom: 16px; display:flex; align-items:center; color: var(--text);"><i data-lucide="list-filter" style="width:16px; margin-right:6px;"></i> Capacity Filters</h3>
            
            <div style="margin-bottom: 16px;">
                <label style="display:flex; justify-content: space-between; font-size:0.8rem; font-weight: 700; margin-bottom: 8px;"><span>Max Price</span> <span id="priceVal" style="color:var(--text-sec);">₹100/hr</span></label>
                <input type="range" id="filterPrice" min="20" max="100" step="10" value="100" style="width:100%; accent-color: #000;">
            </div>
            
            <div style="margin-bottom: 16px;">
                <label style="display:block; font-size:0.8rem; font-weight: 700; margin-bottom: 8px;">Zone Type</label>
                <select id="filterType" style="width:100%; padding: 8px 12px; border-radius: 8px; border: 1px solid #e2e8f0; font-size:0.85rem; background: #f8fafc; font-weight:500; outline:none; cursor:pointer;">
                    <option value="all">All Zones</option>
                    <option value="public">Public Parking</option>
                    <option value="residential">Residential Complex</option>
                </select>
            </div>

            <label style="display:flex; align-items:center; font-size:0.85rem; font-weight: 700; cursor: pointer; background: #f1f5f9; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0;">
                <input type="checkbox" id="filterAvailable" style="margin-right:8px; accent-color: #000; width: 16px; height: 16px;">
                Hide Full Lots
            </label>
        </div>
    </div>

    <!-- Details Side Panel (Slide from Right) -->
    <div id="sidePanel" style="position: absolute; top: 85px; right: -400px; width: 360px; background: white; height: calc(100vh - 105px); z-index: 1500; box-shadow: -4px 0 30px rgba(0,0,0,0.15); border-radius: 20px 0 0 20px; transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1); overflow-y: auto;">
        <!-- Injected Dynamically by JS -->
    </div>

    <div id="map"></div>

    <!-- Booking Panel (Uber-style) -->
    <div class="booking-panel">
        <h2 class="booking-title">Find Parking</h2>

        <div class="location-inputs">
            <div class="timeline-dots">
                <div class="dot dot-start"></div>
                <div class="line"></div>
                <div class="dot dot-end flex-center">
                    <div class="inner-square"></div>
                </div>
            </div>

            <div class="inputs-wrapper">
                <div class="input-group" style="display: flex; align-items: center; padding: 10px 14px;">
                    <div class="current-location-btn" style="cursor: pointer; padding-right: 8px; display: flex;" title="Use Live GPS">
                        <i data-lucide="navigation" style="color: #3b82f6; width: 18px;"></i>
                    </div>
                    <input type="text" class="location-input" id="searchOrigin" placeholder="From (Enter origin manually or tap GPS)" style="flex: 1; padding: 0; background: transparent;">
                </div>
                <div class="input-group">
                    <input type="text" class="location-input" id="searchDestination" placeholder="To (Where to park?)">
                </div>
            </div>
        </div>

        <div class="booking-options">
            <button class="option-btn">
                <i data-lucide="clock" class="icon-sm"></i>
                <span>Park now</span>
                <i data-lucide="chevron-down" class="chevron"></i>
            </button>
            <button class="option-btn">
                <i data-lucide="user" class="icon-sm"></i>
                <span>For me</span>
                <i data-lucide="chevron-down" class="chevron"></i>
            </button>
        </div>

        <button class="search-btn">Search</button>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script src="utils/geofenceUtils.js"></script>
    <script src="utils/distanceUtils.js"></script>
    <script src="utils/mapFilters.js"></script>
    <script src="map.js"></script>
</body>

</html>
